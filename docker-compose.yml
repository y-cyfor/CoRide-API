services:
  backend:
    image: ycyfor/coride-api-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: coride-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - coride-data:/app/data
      - coride-logs:/app/log
      - ./backend/config:/app/config:ro
    env_file:
      - .env
    environment:
      - CORIDE_DB_PATH=/app/data/coride.db
      - CORIDE_LOG_LEVEL=info

  frontend:
    image: ycyfor/coride-api-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: coride-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  coride-data:
  coride-logs:
