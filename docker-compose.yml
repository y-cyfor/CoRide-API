services:
  coride-api:
    image: cyfor/coride-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coride-api
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - coride-data:/app/data
      - coride-logs:/app/log
      - ./backend/config:/app/config:ro
    env_file:
      - .env
    environment:
      - CORIDE_DB_PATH=/app/data/coride.db
      - CORIDE_LOG_LEVEL=info

volumes:
  coride-data:
  coride-logs:
