version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: coride-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - coride-data:/app/data
      - ./config:/app/config:ro
    environment:
      - RUST_LOG=info

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: coride-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  coride-data:
