name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create deploy package
        run: |
          mkdir -p coride-api-${{ steps.version.outputs.VERSION }}
          cp docker-compose.yml coride-api-${{ steps.version.outputs.VERSION }}/
          cp .env.example coride-api-${{ steps.version.outputs.VERSION }}/
          cp backend/config/config.yaml coride-api-${{ steps.version.outputs.VERSION }}/config.yaml
          cp README.md coride-api-${{ steps.version.outputs.VERSION }}/
          cp LICENSE coride-api-${{ steps.version.outputs.VERSION }}/

          # Replace docker-compose.yml with image-only version
          cat > coride-api-${{ steps.version.outputs.VERSION }}/docker-compose.yml << 'EOF'
          services:
            coride-api:
              image: cyfor/coride-api:latest
              container_name: coride-api
              restart: unless-stopped
              ports:
                - "80:80"
              volumes:
                - ./data:/app/data
                - ./logs:/app/log
              env_file:
                - .env
              environment:
                - CORIDE_DB_PATH=/app/data/coride.db
          EOF

          cat > coride-api-${{ steps.version.outputs.VERSION }}/.env.example << 'EOF'
          # 管理员账号
          CORIDE_ADMIN_USERNAME=admin
          CORIDE_ADMIN_PASSWORD=修改为你的密码

          # JWT 密钥（必须修改为随机字符串）
          CORIDE_JWT_SECRET=修改为随机密钥

          # 日志级别
          CORIDE_LOG_LEVEL=info
          EOF

          cat > coride-api-${{ steps.version.outputs.VERSION }}/README.md << EOF
          # CoRide-API v${{ steps.version.outputs.VERSION }}

          ## 快速部署

          \`\`\`bash
          # 1. 复制并编辑环境变量
          cp .env.example .env
          # 编辑 .env 设置管理员密码和 JWT Secret

          # 2. 启动
          docker compose up -d

          # 3. 查看日志
          docker compose logs -f
          \`\`\`

          默认管理员账号: admin / 你在 .env 中设置的密码

          访问地址: http://你的服务器IP
          EOF

          zip -r coride-api-${{ steps.version.outputs.VERSION }}.zip coride-api-${{ steps.version.outputs.VERSION }}/
          tar -czf coride-api-${{ steps.version.outputs.VERSION }}.tar.gz coride-api-${{ steps.version.outputs.VERSION }}/

      - name: Generate release notes
        id: notes
        run: |
          # Fetch all tags and history for proper diff
          git fetch --tags --unshallow 2>/dev/null || git fetch --tags
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.' | grep -v "^v${{ steps.version.outputs.VERSION }}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT

          # Generate changelog from git log
          CHANGELOG=$(git log "$PREV_TAG..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          PREV_TAG: ${{ steps.notes.outputs.PREV_TAG }}
        run: |
          cat > /tmp/release-notes.md << EOF
          ## CoRide-API v${{ steps.version.outputs.VERSION }}

          ### 更新内容

          ${{ steps.notes.outputs.CHANGELOG }}

          **Full Changelog**: [\`$PREV_TAG\`...\`v${{ steps.version.outputs.VERSION }}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${{ steps.version.outputs.VERSION }})
          EOF

          gh release create "v${{ steps.version.outputs.VERSION }}" \
            --title "v${{ steps.version.outputs.VERSION }}" \
            --notes-file /tmp/release-notes.md \
            coride-api-${{ steps.version.outputs.VERSION }}.zip \
            coride-api-${{ steps.version.outputs.VERSION }}.tar.gz
