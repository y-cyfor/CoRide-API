# CoRide-API Configuration

server:
  port: 8000
  host: "0.0.0.0"
  # CORS allowed origins. Set to empty list [] to restrict, or omit/null to allow all (backwards compatible).
  # Example: ["https://example.com", "https://admin.example.com"]
  cors_allowed_origins: null

database:
  path: "./data/coride.db"
  pool_size: 10

admin:
  username: "admin"
  password: "admin123"

jwt:
  secret: "change-me-to-random-string"
  expires_in: 86400

log:
  level: "info"
  retention_days: 30
  max_records: 100000

proxy:
  timeout: 300000
  max_retries: 1
  log_request_body: false
  log_response_body: false

global_rate_limit:
  qps: 100
  concurrency: 50
  action: "reject"

# Encryption for sensitive fields (channel API keys)
# Set CORIDE_ENCRYPTION_KEY env var to enable AES-256-GCM encryption
encryption:
  api_key_secret: null
